# ============================================================================
# SoummamCar — Render Blueprint (Infrastructure as Code)
# ============================================================================
# Single web service: Express serves API + Frontend (Vite build)
# ============================================================================

databases:
  - name: soummamcar-db
    plan: free
    databaseName: soummamcar
    user: soummamcar

services:
  - type: web
    name: soummamcar
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && cd server && npm install --include=dev && npx prisma generate && npm run build && mkdir -p dist/client && cp -r ../dist/* dist/client/
    startCommand: cd server && npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: soummamcar-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: FRONTEND_URL
        value: https://soummamcar.onrender.com
      - key: APP_URL
        value: https://soummamcar.onrender.com
      - key: VITE_API_URL
        value: /api
      - key: VITE_WHATSAPP_NUMBER
        value: "213555000000"
